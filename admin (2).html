<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>h24italia — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#111;--paper:#faf7f2;--cream:#f0ece3;--warm:#e8e2d6;--red:#b5291c;--gold:#b8963e;--muted:#7a7060;--line:rgba(0,0,0,0.10);--success:#2d7a3a;}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh;}
::selection{background:var(--gold);color:#fff}
#login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:1000;flex-direction:column;gap:28px;}
#login-screen h1{font-family:'Playfair Display',serif;font-size:44px;color:#fff;letter-spacing:-2px;}
#login-screen h1 em{font-style:italic;color:var(--red);}
#login-screen p{color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:3px;text-transform:uppercase;}
.lbox{display:flex;flex-direction:column;gap:12px;width:320px;}
.lbox input{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);padding:14px 18px;color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s;}
.lbox input:focus{border-color:var(--gold);}
.lbox input::placeholder{color:rgba(255,255,255,0.3);}
#lerr{color:#e74c3c;font-size:12px;text-align:center;display:none;}
.adm-hdr{background:var(--ink);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:200;}
.adm-logo{font-family:'Playfair Display',serif;font-size:20px;color:#fff;letter-spacing:-0.5px;text-decoration:none;}
.adm-logo em{font-style:italic;color:var(--red);}
.adm-logo sup{font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.35);margin-left:8px;font-style:normal;vertical-align:middle;}
.hdr-r{display:flex;align-items:center;gap:14px;}
.tkb{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;font-weight:600;}
.tkb.ok{background:rgba(45,122,58,0.2);color:#4caf6e;}
.tkb.no{background:rgba(181,41,28,0.2);color:#e57373;}
.hbtn{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.4);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color 0.2s;text-decoration:none;}
.hbtn:hover{color:#fff;}
#setup-bar{background:#0d1f10;border-bottom:1px solid rgba(76,175,110,0.2);padding:12px 32px;display:none;align-items:center;gap:16px;flex-wrap:wrap;}
#setup-bar.show{display:flex;}
#setup-bar p{font-size:12px;color:rgba(255,255,255,0.6);flex-shrink:0;}
#setup-bar p a{color:var(--gold);text-decoration:none;}
.srow{display:flex;gap:8px;flex:1;min-width:300px;}
.srow input{flex:1;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:8px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;}
.srow input::placeholder{color:rgba(255,255,255,0.3);}
.srow button{background:var(--gold);color:#fff;border:none;padding:8px 18px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-weight:600;}
.adm-layout{display:grid;grid-template-columns:248px 1fr;min-height:calc(100vh - 56px);}
.sidebar{background:var(--cream);border-right:1px solid var(--line);padding:16px 0;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px);}
.sb-lbl{font-size:9.5px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);font-weight:500;padding:14px 16px 6px;display:block;}
.sbi{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;color:var(--ink);background:none;border-top:none;border-right:none;border-bottom:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;}
.sbi:hover{background:rgba(0,0,0,0.04);}
.sbi.active{background:#fff;border-left-color:var(--red);color:var(--red);}
.sbi-ic{font-size:15px;flex-shrink:0;}
.sb-div{height:1px;background:var(--line);margin:6px 16px;}
#main-content{padding:36px 44px;max-width:920px;}
#main-content h2{font-family:'Playfair Display',serif;font-size:26px;letter-spacing:-0.5px;margin-bottom:6px;}
.pdesc{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.6;}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.span2{grid-column:1/-1;}
label,lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:500;}
input[type=text],input[type=url],input[type=password],input[type=number],select,textarea{background:#fff;border:1.5px solid var(--line);padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color 0.2s;width:100%;resize:vertical;}
input:focus,select:focus,textarea:focus{border-color:var(--ink);}
textarea{min-height:90px;line-height:1.6;}
textarea.tall{min-height:170px;}
.rcard{background:#fff;border:1.5px solid var(--line);padding:18px;margin-bottom:12px;}
.rcard-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.rnum{font-family:'Playfair Display',serif;font-size:28px;color:var(--warm);font-weight:700;line-height:1;}
.rdel{background:none;border:1px solid #e0d8d0;color:var(--muted);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.rdel:hover{background:var(--red);color:#fff;border-color:var(--red);}
.add-r{background:transparent;border:1.5px dashed var(--line);color:var(--muted);padding:11px;width:100%;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;font-weight:500;margin-bottom:16px;}
.add-r:hover{border-color:var(--ink);color:var(--ink);}
.tkrow{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.tkrow input{flex:1;}
.tkx{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 4px;line-height:1;transition:color 0.2s;flex-shrink:0;}
.tkx:hover{color:var(--red);}
.adm-actions{display:flex;align-items:center;gap:14px;margin-top:28px;padding-top:22px;border-top:2px solid var(--ink);}
.btn{background:var(--ink);color:#fff;border:none;padding:12px 24px;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;font-weight:600;}
.btn:hover{background:var(--red);}
.btn.s{background:transparent;border:1.5px solid var(--line);color:var(--ink);}
.btn.s:hover{background:var(--cream);border-color:var(--ink);}
.btn.d{background:var(--red);}
.btn.d:hover{background:#8a1a14;}
.stmsg{font-size:12px;letter-spacing:0.5px;color:var(--success);display:none;font-weight:500;}
.stmsg.e{color:var(--red);}
.stmsg.on{display:block;}
.art-lst{display:flex;flex-direction:column;gap:3px;margin-bottom:14px;}
.ait{padding:9px 12px;cursor:pointer;border-left:3px solid transparent;transition:all 0.15s;}
.ait:hover{background:rgba(0,0,0,0.04);}
.ait.active{background:#fff;border-left-color:var(--red);}
.ait-cat{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red);font-weight:500;margin-bottom:2px;}
.ait-tit{font-size:12px;font-weight:500;line-height:1.3;}
.ait-met{font-size:10px;color:var(--muted);margin-top:2px;}
.pvbox{background:var(--cream);border:1px solid var(--line);padding:18px;margin-top:8px;}
.pv-cat{font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);font-weight:500;margin-bottom:6px;}
.pv-tit{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;line-height:1.2;margin-bottom:7px;}
.pv-std{font-size:13px;color:var(--muted);font-style:italic;line-height:1.6;margin-bottom:8px;}
.pv-bod{font-size:12px;color:var(--muted);line-height:1.7;}
.pv-met{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:8px;padding-top:7px;border-top:1px solid var(--line);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px;color:var(--muted);text-align:center;}
.empty .bg{font-size:52px;opacity:0.15;}
@media(max-width:768px){.adm-layout{grid-template-columns:1fr;}.sidebar{position:relative;height:auto;top:0;}#main-content{padding:22px 18px;}.fgrid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div id="login-screen">
  <h1>h24<em>italia</em></h1>
  <p>Pannello di amministrazione</p>
  <div class="lbox">
    <input type="password" id="pwd" placeholder="Password admin" autocomplete="current-password">
    <button class="btn" onclick="login()">Accedi →</button>
    <div id="lerr">Password errata.</div>
  </div>
</div>

<header class="adm-hdr">
  <a href="#" class="adm-logo">h24<em>italia</em><sup>Admin</sup></a>
  <div class="hdr-r">
    <div id="tkb" class="tkb no">GitHub non configurato</div>
    <a href="/" target="_blank" class="hbtn">Vedi sito →</a>
    <button class="hbtn" onclick="logout()">Esci</button>
  </div>
</header>

<div id="setup-bar">
  <p>Configura <strong>GitHub</strong> per pubblicare. Serve un <a href="https://github.com/settings/tokens/new?scopes=repo&description=h24italia-admin" target="_blank">Personal Access Token</a> con permesso <strong>repo</strong>.</p>
  <div class="srow">
    <input type="password" id="bar-tok" placeholder="Incolla il token GitHub (ghp_...)">
    <button onclick="saveBarTok()">Salva</button>
  </div>
</div>

<div class="adm-layout">
  <nav class="sidebar" id="sidebar">
    <span class="sb-lbl">Contenuti</span>
    <button class="sbi active" onclick="go('articles')"><span class="sbi-ic">📰</span>Articoli</button>
    <button class="sbi" onclick="go('hero')"><span class="sbi-ic">⭐</span>Articolo Hero</button>
    <button class="sbi" onclick="go('sidebar-art')"><span class="sbi-ic">📋</span>Articoli sidebar</button>
    <button class="sbi" onclick="go('approf')"><span class="sbi-ic">🔍</span>Approfondimenti</button>
    <div class="sb-div"></div>
    <span class="sb-lbl">Sito</span>
    <button class="sbi" onclick="go('ticker')"><span class="sbi-ic">📡</span>Ticker breaking</button>
    <button class="sbi" onclick="go('pullquote')"><span class="sbi-ic">💬</span>Citazione centrale</button>
    <button class="sbi" onclick="go('social')"><span class="sbi-ic">📱</span>Card social</button>
    <button class="sbi" onclick="go('goldband')"><span class="sbi-ic">✨</span>Banda dorata</button>
    <button class="sbi" onclick="go('newsletter')"><span class="sbi-ic">📧</span>Newsletter</button>
    <div class="sb-div"></div>
    <span class="sb-lbl">Impostazioni</span>
    <button class="sbi" onclick="go('settings')"><span class="sbi-ic">⚙️</span>GitHub & Token</button>
  </nav>
  <main id="main-content">
    <div class="empty"><div class="bg">⏳</div><p>Caricamento...</p></div>
  </main>
</div>

<script>
const PWD='h24italia2026', REPO='Monetti13/h24italia';
let ghToken=localStorage.getItem('gh_token')||'';
let articles=[], config={}, curArt=null, curPage='articles';

function login(){
  if(document.getElementById('pwd').value===PWD){document.getElementById('login-screen').style.display='none';init();}
  else{document.getElementById('lerr').style.display='block';document.getElementById('pwd').value='';}
}
document.getElementById('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
function logout(){document.getElementById('login-screen').style.display='flex';}

async function init(){updateTkb();await Promise.all([loadArt(),loadCfg()]);go('articles');}

function updateTkb(){
  const b=document.getElementById('tkb'),bar=document.getElementById('setup-bar');
  if(ghToken){b.textContent='✓ GitHub OK';b.className='tkb ok';bar.classList.remove('show');}
  else{b.textContent='GitHub non configurato';b.className='tkb no';bar.classList.add('show');}
}
function saveBarTok(){const t=document.getElementById('bar-tok').value.trim();if(t){ghToken=t;localStorage.setItem('gh_token',t);updateTkb();}}

async function loadArt(){try{const r=await fetch('articles.json?t='+Date.now());if(r.ok)articles=await r.json();}catch(e){}if(!articles.length)articles=[{id:1,categoria:'Primo Piano',titolo:"L'Italia che vuole cambiare",standfirst:"C'è un Paese che corre.",corpo:"Il dibattito politico.",autore:'Redazione',data:'1 Maggio 2026',minuti:8,featured:true}];}
async function loadCfg(){try{const r=await fetch('config.json?t='+Date.now());if(r.ok)config=await r.json();}catch(e){}if(!Object.keys(config).length)config={ticker:['Notizia 1'],hero:{categoria:'Primo Piano',titolo:'',standfirst:'',corpo:'',autore:'Redazione',data:'1 Maggio 2026',minuti:8},sidebar:[{categoria:'Economia',titolo:''}],approfondimenti:[{label:'Approfondimento',titolo:'',corpo:'',cta:'Leggi'},{label:'Reportage',titolo:'',corpo:'',cta:'Leggi'}],pullquote:'',pullquote_fonte:'',social:[{platform:'Instagram',titolo:'',views:'',url:''}],goldbandquote:'',newsletter_titolo:'',newsletter_testo:'',footer_desc:'',instagram_url:'',tiktok_url:''};}

function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'):''}
function todayIT(){const m=['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'],d=new Date();return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;}
function catOpts(sel){return ['Primo Piano','Cronaca','Economia','Cultura','Società','Politica','Ambiente','Lavoro','Tecnologia','Esteri'].map(c=>`<option value="${c}"${sel===c?' selected':''}>${c}</option>`).join('');}

function go(page){
  curPage=page;
  document.querySelectorAll('.sbi').forEach(b=>b.classList.remove('active'));
  const map={articles:0,hero:1,'sidebar-art':2,approf:3,ticker:4,pullquote:5,social:6,goldband:7,newsletter:8,settings:9};
  const btns=document.querySelectorAll('.sbi');
  if(btns[map[page]])btns[map[page]].classList.add('active');
  const pages={articles:pArticles,hero:pHero,'sidebar-art':pSidebarArt,approf:pApprof,ticker:pTicker,pullquote:pPullquote,social:pSocial,goldband:pGoldband,newsletter:pNewsletter,settings:pSettings};
  if(pages[page])document.getElementById('main-content').innerHTML=pages[page]();
}

// ── ARTICLES ──
function pArticles(){
  const list=articles.map(a=>`<div class="ait${curArt===a.id?' active':''}" onclick="selArt(${a.id})"><div class="ait-cat">${esc(a.categoria)}${a.featured?' ★':''}</div><div class="ait-tit">${esc(a.titolo).substring(0,46)}${a.titolo.length>46?'…':''}</div><div class="ait-met">${esc(a.autore)} · ${esc(a.data)}</div></div>`).join('');
  const ed=curArt?artEditor(articles.find(a=>a.id===curArt)):`<div class="empty"><div class="bg">✍️</div><p>Seleziona un articolo o creane uno nuovo</p></div>`;
  return `<div style="display:grid;grid-template-columns:252px 1fr;min-height:calc(100vh - 56px);">
    <div style="background:var(--cream);border-right:1px solid var(--line);padding:16px 0;">
      <div style="padding:0 14px 12px;"><button class="btn" style="width:100%;font-size:10px;" onclick="newArt()">+ Nuovo articolo</button></div>
      <div class="art-lst">${list}</div>
    </div>
    <div id="art-ed-wrap" style="padding:32px 36px;max-width:820px;">${ed}</div>
  </div>`;
}
function selArt(id){curArt=id;go('articles');}
function newArt(){const id=Date.now();articles.unshift({id,categoria:'Cronaca',titolo:'',standfirst:'',corpo:'',autore:'Redazione',data:todayIT(),minuti:5,featured:false});curArt=id;go('articles');}
function artEditor(a){
  if(!a)return '';
  return `<h2>${esc(a.titolo)||'Nuovo articolo'}</h2>
  <p class="pdesc">Scrivi e pubblica l'articolo sul sito.</p>
  <div class="fgrid">
    <div class="fg"><label>Categoria</label><select id="ac-cat">${catOpts(a.categoria)}</select></div>
    <div class="fg"><label>Autore</label><input type="text" id="ac-aut" value="${esc(a.autore)}"></div>
    <div class="fg"><label>Data</label><input type="text" id="ac-dat" value="${esc(a.data)}"></div>
    <div class="fg"><label>Min lettura</label><input type="number" id="ac-min" value="${a.minuti}" min="1"></div>
    <div class="fg span2"><label>Titolo</label><input type="text" id="ac-tit" value="${esc(a.titolo)}" placeholder="Titolo..." oninput="lprev()"></div>
    <div class="fg span2"><label>Occhiello</label><textarea id="ac-std" oninput="lprev()">${esc(a.standfirst)}</textarea></div>
    <div class="fg span2"><label>Corpo articolo</label><textarea id="ac-bod" class="tall" oninput="lprev()">${esc(a.corpo)}</textarea></div>
    <div class="fg span2"><label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-size:13px;color:var(--ink);cursor:pointer;"><input type="checkbox" id="ac-feat"${a.featured?' checked':''} style="width:auto;"> Metti in evidenza come Hero</label></div>
  </div>
  <label>Anteprima</label>
  <div class="pvbox" id="lprev">
    <div class="pv-cat">${esc(a.categoria)}</div>
    <div class="pv-tit">${esc(a.titolo)||'Titolo...'}</div>
    <div class="pv-std">${esc(a.standfirst)||'Occhiello...'}</div>
    <div class="pv-bod">${esc(a.corpo).substring(0,180)||'Testo...'}${a.corpo.length>180?'…':''}</div>
    <div class="pv-met">${esc(a.autore)} · ${esc(a.data)} · ${a.minuti} min</div>
  </div>
  <div class="adm-actions">
    <button class="btn" onclick="saveArt(${a.id})">💾 Salva e pubblica</button>
    <button class="btn s" onclick="delArt(${a.id})">🗑 Elimina</button>
    <div class="stmsg" id="art-st"></div>
  </div>`;
}
function lprev(){
  const p=document.getElementById('lprev');if(!p)return;
  const cat=document.getElementById('ac-cat')?.value||'',tit=document.getElementById('ac-tit')?.value||'',std=document.getElementById('ac-std')?.value||'',bod=document.getElementById('ac-bod')?.value||'',aut=document.getElementById('ac-aut')?.value||'',dat=document.getElementById('ac-dat')?.value||'',min=document.getElementById('ac-min')?.value||'';
  p.innerHTML=`<div class="pv-cat">${esc(cat)}</div><div class="pv-tit">${esc(tit)||'Titolo...'}</div><div class="pv-std">${esc(std)||'Occhiello...'}</div><div class="pv-bod">${esc(bod).substring(0,180)||'Testo...'}${bod.length>180?'…':''}</div><div class="pv-met">${esc(aut)} · ${esc(dat)} · ${esc(min)} min</div>`;
}
async function saveArt(id){
  const idx=articles.findIndex(a=>a.id===id);if(idx===-1)return;
  articles[idx]={id,categoria:document.getElementById('ac-cat').value,titolo:document.getElementById('ac-tit').value,standfirst:document.getElementById('ac-std').value,corpo:document.getElementById('ac-bod').value,autore:document.getElementById('ac-aut').value,data:document.getElementById('ac-dat').value,minuti:parseInt(document.getElementById('ac-min').value)||5,featured:document.getElementById('ac-feat').checked};
  await pub('articles.json',JSON.stringify(articles,null,2),'art-st');
}
function delArt(id){if(!confirm('Eliminare?'))return;articles=articles.filter(a=>a.id!==id);curArt=null;if(ghToken)ghPush('articles.json',JSON.stringify(articles,null,2)).catch(()=>{});go('articles');}

// ── HERO ──
function pHero(){const h=config.hero||{};return `<h2>⭐ Articolo Hero</h2><p class="pdesc">Il grande articolo in primo piano nella parte alta del sito.</p>
  <div class="fgrid">
    <div class="fg"><label>Categoria</label><select id="hc-cat">${catOpts(h.categoria)}</select></div>
    <div class="fg"><label>Autore</label><input type="text" id="hc-aut" value="${esc(h.autore||'')}"></div>
    <div class="fg"><label>Data</label><input type="text" id="hc-dat" value="${esc(h.data||'')}"></div>
    <div class="fg"><label>Min lettura</label><input type="number" id="hc-min" value="${h.minuti||8}"></div>
    <div class="fg span2"><label>Titolo</label><input type="text" id="hc-tit" value="${esc(h.titolo||'')}"></div>
    <div class="fg span2"><label>Occhiello in corsivo</label><textarea id="hc-std">${esc(h.standfirst||'')}</textarea></div>
    <div class="fg span2"><label>Paragrafo corpo</label><textarea id="hc-bod" class="tall">${esc(h.corpo||'')}</textarea></div>
  </div>
  <div class="adm-actions"><button class="btn" onclick="saveHero()">💾 Salva e pubblica</button><div class="stmsg" id="hc-st"></div></div>`;}
async function saveHero(){config.hero={categoria:document.getElementById('hc-cat').value,titolo:document.getElementById('hc-tit').value,standfirst:document.getElementById('hc-std').value,corpo:document.getElementById('hc-bod').value,autore:document.getElementById('hc-aut').value,data:document.getElementById('hc-dat').value,minuti:parseInt(document.getElementById('hc-min').value)||8};await pub('config.json',JSON.stringify(config,null,2),'hc-st');}

// ── SIDEBAR ART ──
function pSidebarArt(){
  const sb=config.sidebar||[];

function pSettings(){return `<h2>⚙️ GitHub & Impostazioni</h2><p class="pdesc">Token GitHub per pubblicare dal pannello. Serve permesso <strong>repo</strong>.<br>Genera da: <a href="https://github.com/settings/tokens/new?scopes=repo&description=h24italia-admin" target="_blank" style="color:var(--red)">github.com/settings/tokens</a></p><div class="fg"><label>Token GitHub (ghp_...)</label><input type="password" id="st-tok" value="${ghToken}" placeholder="ghp_..."></div><div class="fg"><label>URL Instagram</label><input type="url" id="st-ig" value="${esc(config.instagram_url||'')}"></div><div class="fg"><label>URL TikTok</label><input type="url" id="st-tt" value="${esc(config.tiktok_url||'')}"></div><div class="fg"><label>Descrizione footer</label><textarea id="st-fd">${esc(config.footer_desc||'')}</textarea></div><div class="adm-actions"><button class="btn" onclick="saveSt()">💾 Salva</button>${ghToken?`<button class="btn d" onclick="clrTok()">Rimuovi token</button>`:''}<div class="stmsg" id="st-st"></div></div>`;}
async function saveSt(){const t=document.getElementById('st-tok').value.trim();if(t){ghToken=t;localStorage.setItem('gh_token',t);updateTkb();}config.instagram_url=document.getElementById('st-ig').value;config.tiktok_url=document.getElementById('st-tt').value;config.footer_desc=document.getElementById('st-fd').value;const m=document.getElementById('st-st');m.textContent='✓ Salvato!';m.className='stmsg on';if(ghToken)await ghPush('config.json',JSON.stringify(config,null,2)).catch(()=>{});setTimeout(()=>m.classList.remove('on'),3000);}
function clrTok(){if(!confirm('Rimuovere il token?'))return;ghToken='';localStorage.removeItem('gh_token');updateTkb();go('settings');}

// ── GITHUB ──
async function ghPush(path,content){
  const h={'Authorization':'token '+ghToken,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'};
  let sha='';
  try{const r=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{headers:h});if(r.ok){const d=await r.json();sha=d.sha;}}catch(e){}
  const body={message:`Admin: aggiorna ${path}`,content:btoa(unescape(encodeURIComponent(content))),...(sha?{sha}:{})};
  const res=await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`,{method:'PUT',headers:h,body:JSON.stringify(body)});
  if(!res.ok){const e=await res.json();throw new Error(e.message||'Errore GitHub');}
  return res.json();
}
async function pub(file,content,stId){
  const m=document.getElementById(stId);if(!m)return;
  if(!ghToken){m.textContent='⚠️ Configura il token GitHub nelle impostazioni!';m.className='stmsg on e';return;}
  m.textContent='⏳ Pubblicazione...';m.className='stmsg on';
  try{await ghPush(file,content);m.textContent='✓ Pubblicato sul sito!';m.className='stmsg on';setTimeout(()=>m.classList.remove('on'),4000);}
  catch(e){m.textContent='Errore: '+e.message;m.className='stmsg on e';}
}
